name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install project
        run: python -m pip install --upgrade pip setuptools && pip install -e ".[dev,full]" pip-audit
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest -q
      - name: Import API
        run: python -c "from sensor_fault_detection.api import create_app; create_app()"
      - name: Build package
        run: python -m build
      - name: Build Docker image
        run: docker build -f dockerfile -t sensor-fault-detection:ci .
      - name: Audit dependencies
        run: pip-audit
